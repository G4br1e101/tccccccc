<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Catálogo de Produtos</title>
  <style>
    /* Reset básico */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      color: #333;
      padding: 20px;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
    }

    h1 {
      color: #2c3e50;
    }

    .product-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .product-card {
      background-color: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 15px;
      transition: transform 0.2s ease;
    }

    .product-card:hover {
      transform: translateY(-5px);
    }

    .product-image {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 6px;
      margin-bottom: 10px;
    }

    .product-name {
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .product-description {
      font-size: 0.95rem;
      color: #666;
    }
      
    footer {
      text-align: center;
      margin-top: 40px;
      color: #777;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Catálogo de Produtos</h1>
  </header>

  <main>
    <section id="product-list" class="product-list">
      <!-- Produtos serão inseridos aqui via JavaScript -->
    </section>
  </main>

  <footer>
    <p>© 2026 Seu Nome - Trabalho de TCC</p>
  </footer>

  <script>
    // Lista de produtos (exemplo)
    const products = [
      {
        id: 1,
        name: "Camiseta Básica",
        description: "Camiseta 100% algodão, disponível em várias cores.",
        image: "https://via.placeholder.com/300x180?text=Camiseta+Básica"
      },
      {
        id: 2,
        name: "Tênis Esportivo",
        description: "Tênis confortável para atividades físicas e uso diário.",
        image: "https://via.placeholder.com/300x180?text=Tênis+Esportivo"
      },
      {
        id: 3,
        name: "Mochila Casual",
        description: "Mochila resistente com vários compartimentos.",
        image: "https://via.placeholder.com/300x180?text=Mochila+Casual"
      },
      {
        id: 4,
        name: "Relógio Digital",
        description: "Relógio com display digital e várias funções.",
        image: "https://via.placeholder.com/300x180?text=Relógio+Digital"
      }
    ];

    // Função para renderizar os produtos na página
    function renderProducts() {
      const productList = document.getElementById("product-list");
      productList.innerHTML = "";

      products.forEach(product => {
        const card = document.createElement("div");
        card.className = "product-card";

        card.innerHTML = `
          <img src="${product.image}" alt="${product.name}" class="product-image" />
          <h2 class="product-name">${product.name}</h2>
          <p class="product-description">${product.description}</p>
        `;

        productList.appendChild(card);
      });
    }

    // Executa a renderização ao carregar a página
    window.onload = renderProducts;
  </script>
</body>
</html>
